name: DumprX

on:
  workflow_dispatch:
    inputs:
      ROM_URL:
        description: "Direct Link of the ROM/Firmware to Dump"
        required: true
      EXTRA_CMD:
        description: "Any Extra Command to Run Before Dump"
        required: false

defaults:
  run:
    shell: bash

env:
  ROM_URL: ${{ github.event.inputs.ROM_URL }}
  PUSH_TO_GITLAB: true
  EXTRA_CMD: ${{ github.event.inputs.EXTRA_CMD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone DumprX
        run: |
          git clone https://github.com/DumprX/DumprX.git

      - name: Configure Git
        run: |
          git config --global user.name "atharvnegi"
          git config --global user.email "atharvnegi2951@gmail.com"

      - name: Configure SSH
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "${{ secrets.PRIV_SSH_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts"
          ssh-keyscan gitlab.com >> "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

          cat > "$HOME/.ssh/config" <<EOF
          Host github.com
            User git
            IdentityFile $HOME/.ssh/id_ed25519
            IdentitiesOnly yes

          Host gitlab.com
            User git
            IdentityFile $HOME/.ssh/id_ed25519
            IdentitiesOnly yes
          EOF

          chmod 600 "$HOME/.ssh/config"

          echo "=== HOME ==="
          echo "$HOME"

          echo "=== SSH Directory ==="
          ls -lah "$HOME/.ssh"

          echo "=== Key Size ==="
          wc -c "$HOME/.ssh/id_ed25519"

          echo "=== Known Hosts ==="
          cat "$HOME/.ssh/known_hosts"

          echo "=== Testing GitLab SSH ==="
          ssh -vvv -T git@gitlab.com || true

      - name: Setup DumprX Config
        working-directory: DumprX
        run: |
          sudo bash setup.sh
          echo "${{ secrets.GITLAB_TOKEN }}" > .gitlab_token
          echo "${{ secrets.GITLAB_GROUP }}" > .gitlab_group
          echo "${{ secrets.BOT_TOKEN }}" > .tg_token
          echo "${{ secrets.CHAT_ID }}" > .tg_chat

      - name: Run Extra Command
        working-directory: DumprX
        run: |
          $EXTRA_CMD

      - name: Start Dumping
        working-directory: DumprX
        run: |
          ./dumper.sh "$ROM_URL"
