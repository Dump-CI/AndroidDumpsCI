name: DumprX

on:
  workflow_dispatch:
    inputs:
      ROM_URL:
        description: "Direct Link of the ROM/Firmware to Dump"
        required: true
      EXTRA_CMD:
        description: "Extra command to run before dumping"
        required: false
        default: ""

env:
  ROM_URL: ${{ github.event.inputs.ROM_URL }}
  EXTRA_CMD: ${{ github.event.inputs.EXTRA_CMD }}
  PUSH_TO_GITLAB: true

jobs:
  dump:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            git-lfs \
            curl \
            wget \
            unzip \
            zip \
            jq \
            p7zip-full \
            python3 \
            python3-pip \
            aria2 \
            xz-utils \
            lz4 \
            zstd \
            brotli \
            ca-certificates \
            openssh-client

          python3 -m pip install --upgrade pip
          python3 -m pip install uv

          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Clone DumprX
        run: |
          git clone https://github.com/DumprX/DumprX.git

      - name: Configure Git
        run: |
          git config --global user.name "atharvnegi"
          git config --global user.email "atharvnegi2951@gmail.com"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.PRIV_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan github.com >> ~/.ssh/known_hosts
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host github.com
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes

          Host gitlab.com
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
          EOF

      - name: Configure DumprX
        working-directory: DumprX
        run: |
          echo "${{ secrets.GITLAB_TOKEN }}" > .gitlab_token
          echo "${{ secrets.GITLAB_GROUP }}" > .gitlab_group
          echo "${{ secrets.BOT_TOKEN }}" > .tg_token
          echo "${{ secrets.CHAT_ID }}" > .tg_chat

      - name: Run Extra Command
        if: ${{ env.EXTRA_CMD != '' }}
        working-directory: DumprX
        run: |
          eval "$EXTRA_CMD"

      - name: Start Dumping
        working-directory: DumprX
        run: |
          chmod +x dumper.sh
          ./dumper.sh "$ROM_URL"
